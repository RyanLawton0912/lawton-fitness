<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Lawton Fitness"/>
<meta name="theme-color" content="#3b82f6"/>
<title>Lawton Fitness</title>
<style>
:root{
  --bg:#0d0f14;--bg2:#131720;--bg3:#1a2030;--bg4:#1e2433;
  --border:#1e2433;--border2:#253048;
  --blue:#3b82f6;--blue2:#2563eb;
  --teal:#22d3ee;--amber:#f59e0b;--red:#f87171;--green:#4ade80;--purple:#a78bfa;
  --text:#f1f5f9;--text2:#cbd5e1;--text3:#64748b;--text4:#334155;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;font-family:-apple-system,'SF Pro Display',system-ui,sans-serif}
html,body{height:100%;background:var(--bg);color:var(--text);overscroll-behavior:none;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{display:none}
input,textarea,button,select{font-family:inherit;font-size:inherit;color:inherit}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.4)}
#app{display:flex;flex-direction:column;height:100dvh;padding-top:env(safe-area-inset-top)}
#header{display:flex;justify-content:space-between;align-items:center;padding:14px 20px 10px;flex-shrink:0;border-bottom:1px solid var(--border)}
#nav{display:flex;padding:0 4px;overflow-x:auto;flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--border);scrollbar-width:none}
#main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.page{display:none;padding:20px 16px calc(90px + env(safe-area-inset-bottom));max-width:640px;margin:0 auto}
.page.active{display:block}
#pin-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;z-index:1000;padding-top:calc(env(safe-area-inset-top) + 32px)}
.pin-brand{font-size:22px;font-weight:800;letter-spacing:3px;color:var(--text);margin-bottom:6px;text-align:center}
.pin-tag{font-size:12px;color:var(--text3);letter-spacing:1px;margin-bottom:36px;text-align:center}
.pin-label{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:24px;text-align:center}
.pin-info{font-size:13px;color:var(--text3);text-align:center;max-width:280px;line-height:1.6;margin-bottom:16px;display:none}
.pin-dots{display:flex;gap:18px;margin-bottom:14px}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border2);background:transparent;transition:all .2s}
.pin-dot.filled{background:var(--blue);border-color:var(--blue);box-shadow:0 0 10px rgba(59,130,246,.4)}
.pin-error{color:var(--red);font-size:13px;margin-bottom:14px;min-height:20px;text-align:center}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;max-width:290px;margin-top:6px}
.pin-btn{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:20px;font-size:24px;font-weight:600;color:var(--text);cursor:pointer;transition:all .15s}
.pin-btn:active{background:var(--bg3);transform:scale(.95)}
.pin-btn.empty{opacity:0;pointer-events:none}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 10px 8px;border:none;background:transparent;color:var(--text3);cursor:pointer;font-size:9px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;min-width:50px;white-space:nowrap;flex-shrink:0;border-bottom:2px solid transparent;transition:all .2s;margin-bottom:-1px}
.nav-btn svg{width:18px;height:18px;stroke-width:1.8}
.nav-btn.active{color:var(--blue);border-bottom-color:var(--blue)}
.page-title{font-size:24px;font-weight:800;color:var(--text);letter-spacing:-.5px}
.page-sub{font-size:13px;color:var(--text3);margin-top:2px;margin-bottom:18px}
.section-lbl{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;display:block}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:18px;margin-bottom:12px}
.card-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.card-title{font-size:16px;font-weight:700;color:var(--text)}
.card-date{font-size:11px;color:var(--text3);font-weight:500}
.card-meta{font-size:12px;color:var(--text3);margin-top:3px}
.empty-state{text-align:center;padding:52px 20px;color:var(--text3)}
.empty-icon{font-size:36px;margin-bottom:12px;display:block;opacity:.5}
.empty-text{font-size:15px;font-weight:600;color:var(--text2);margin-bottom:4px}
.empty-sub{font-size:13px}
.stats-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stats-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:15px}
.stat-val{font-size:24px;font-weight:800;letter-spacing:-.5px;line-height:1.1}
.stat-lbl{font-size:11px;color:var(--text3);margin-top:5px}
.prog-row{display:flex;align-items:center;gap:10px}
.prog-bar{flex:1;background:var(--bg4);border-radius:999px;height:7px;overflow:hidden}
.prog-fill{height:100%;border-radius:999px;background:var(--blue);transition:width .5s ease}
.prog-pct{font-weight:700;font-size:13px;color:var(--blue);min-width:34px;text-align:right}
.ring-wrap{position:relative;flex-shrink:0}
.ring-wrap svg{transform:rotate(-90deg);display:block}
.ring-center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-weight:800}
.btn-primary{background:var(--blue);border:none;border-radius:14px;padding:15px;color:#fff;font-size:16px;font-weight:700;width:100%;margin-top:6px;cursor:pointer;transition:all .15s;letter-spacing:.2px}
.btn-primary:active{background:var(--blue2);transform:scale(.99)}
.btn-ghost{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:8px 14px;font-size:13px;color:var(--text2);cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-weight:600;transition:all .15s}
.btn-ghost:active{background:var(--bg4)}
.btn-soft{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.25);border-radius:10px;padding:7px 14px;font-size:12px;font-weight:700;color:var(--blue);cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .15s}
.btn-soft:active{background:rgba(59,130,246,.2)}
.btn-icon{background:var(--bg3);border:1px solid var(--border2);border-radius:9px;padding:7px 9px;color:var(--text3);cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;justify-content:center}
.btn-icon:active{background:var(--bg4)}
.btn-danger{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.25);border-radius:10px;padding:8px 14px;font-size:12px;font-weight:600;color:var(--red);cursor:pointer;display:inline-flex;align-items:center;gap:6px;margin-top:10px;transition:all .15s}
.btn-danger:active{background:rgba(248,113,113,.2)}
.btn-sm{background:transparent;border:1px solid var(--border2);border-radius:8px;padding:6px 12px;color:var(--text3);cursor:pointer;font-size:12px;font-weight:500;transition:all .15s}
.btn-sm:active{background:var(--bg3)}
.btn-sm.on{border-color:rgba(59,130,246,.5);color:var(--blue);background:rgba(59,130,246,.1)}
.btn-update{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.3);border-radius:8px;padding:6px 12px;color:var(--blue);cursor:pointer;font-size:12px;font-weight:700;transition:all .15s}
.ph-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px}
#fab{position:fixed;bottom:calc(20px + env(safe-area-inset-bottom));right:20px;width:56px;height:56px;border-radius:999px;background:var(--blue);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(59,130,246,.4),0 1px 4px rgba(0,0,0,.3);z-index:100;transition:all .2s}
#fab:active{transform:scale(.92);background:var(--blue2)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;transition:opacity .25s;pointer-events:none}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal-box{background:var(--bg2);border:1px solid var(--border2);border-radius:24px 24px 0 0;width:100%;max-width:600px;max-height:94dvh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,0,.67,0)}
.modal-overlay.open .modal-box{transform:translateY(0)}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:999px;margin:12px auto 0}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;padding:14px 20px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-title{font-size:17px;font-weight:800;color:var(--text)}
.modal-body{padding:16px 20px calc(20px + env(safe-area-inset-bottom));overflow-y:auto;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column;gap:13px}
.field{display:flex;flex-direction:column;gap:6px}
.lbl{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:1px;text-transform:uppercase}
.inp{background:var(--bg3);border:1px solid var(--border2);border-radius:12px;padding:13px 16px;color:var(--text);font-size:15px;outline:none;transition:border-color .2s;width:100%}
.inp:focus{border-color:rgba(59,130,246,.6)}
.inp::placeholder{color:var(--text4)}
textarea.inp{resize:none;min-height:80px;line-height:1.5}
.inp2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.inp3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.sinp{background:var(--bg);border:1px solid var(--border2);border-radius:10px;padding:11px 6px;color:var(--text);font-size:14px;outline:none;text-align:center;width:100%;transition:border-color .2s}
.sinp:focus{border-color:rgba(59,130,246,.6)}
.ex-block{background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px}
.sets-hdr{display:grid;grid-template-columns:26px 1fr 1fr 30px;gap:8px;margin-bottom:8px}
.sets-hdr span{font-size:10px;color:var(--text3);font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.sets-row{display:grid;grid-template-columns:26px 1fr 1fr 30px;gap:8px;margin-bottom:8px;align-items:center}
.set-num{font-size:11px;color:var(--text3);font-weight:600;text-align:center}
.last-hint{font-size:11px;color:var(--text3);font-style:italic;padding:3px 2px;display:block}
.toggle{width:46px;height:27px;border-radius:999px;cursor:pointer;position:relative;border:none;transition:background .25s;flex-shrink:0}
.toggle-thumb{position:absolute;top:3px;width:21px;height:21px;border-radius:50%;background:#fff;transition:transform .25s;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.swatch{width:30px;height:30px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:border-color .15s;flex-shrink:0}
.swatch.on{border-color:#fff}
.badge{display:inline-block;border-radius:8px;padding:3px 10px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.chip-row{display:flex;flex-wrap:wrap;gap:8px}
.macro-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px}
.macro-chip{display:flex;align-items:center;gap:7px}
.macro-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.macro-val{font-size:14px;font-weight:800}
.macro-lbl{font-size:10px;color:var(--text3)}
.bar-chart{display:flex;gap:5px;align-items:flex-end;height:80px;margin-top:4px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;height:100%}
.bar-wrap{flex:1;width:100%;display:flex;align-items:flex-end}
.bar{width:100%;border-radius:5px 5px 0 0;min-height:4px;transition:height .5s}
.bar-lbl{font-size:9px;color:var(--text3);text-align:center}
.pb-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.supp-pill{border-radius:999px;padding:6px 13px;font-size:12px;font-weight:600;border:1px solid;display:inline-block}
.expand-area{margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.set-chips{display:flex;flex-wrap:wrap;gap:8px}
.set-chip{background:var(--bg3);border-radius:9px;padding:7px 11px}
.set-chip-n{font-size:10px;color:var(--text3);display:block;margin-bottom:2px}
.set-chip-v{font-size:13px;font-weight:700}
.ex-name-lbl{font-size:12px;font-weight:700;color:var(--blue);margin-bottom:8px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:6px}
.cal-dh{font-size:10px;color:var(--text3);font-weight:600;text-align:center;padding:6px 0}
.cal-day{aspect-ratio:1;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .15s;position:relative;border:1px solid transparent}
.cal-day.has-data{font-weight:700;color:var(--text)}
.cal-day.has-data::after{content:'';position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--blue)}
.cal-day.today{border-color:var(--blue);color:var(--blue);font-weight:800}
.cal-day.sel{background:var(--blue);color:#fff !important;border-color:transparent}
.cal-day.sel::after{background:#fff}
.cal-day.other{color:var(--text4)}
.cal-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.cal-month{font-size:16px;font-weight:700}
.tpl-card{background:var(--bg3);border:1px solid var(--border2);border-radius:14px;padding:14px;margin-bottom:8px;cursor:pointer;transition:all .2s;display:flex;justify-content:space-between;align-items:center}
.tpl-card:active{background:var(--bg4)}
.bw-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.bw-row:last-child{border-bottom:none}
.divider{height:1px;background:var(--border);margin:4px 0}
.info-box{background:var(--bg3);border:1px solid var(--border2);border-radius:12px;padding:12px 14px;font-size:13px;color:var(--text3);line-height:1.5}
.plan-day{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.plan-day.done{border-color:rgba(74,222,128,.3);background:rgba(74,222,128,.05)}
</style>
</head>
<body>
<div id="pin-screen">
  <svg width="72" height="72" viewBox="0 0 80 80" fill="none" style="margin-bottom:16px">
    <polygon points="40,4 76,24 76,56 40,76 4,56 4,24" fill="#3b82f6" opacity="0.1"/>
    <polygon points="40,4 76,24 76,56 40,76 4,56 4,24" fill="none" stroke="#3b82f6" stroke-width="2"/>
    <polygon points="40,14 66,29 66,51 40,66 14,51 14,29" fill="#3b82f6" opacity="0.15"/>
    <polygon points="40,22 58,33 58,47 40,58 22,47 22,33" fill="#3b82f6" opacity="0.2"/>
    <text x="40" y="51" text-anchor="middle" fill="#3b82f6" font-size="24" font-weight="800" font-family="-apple-system,sans-serif">LF</text>
  </svg>
  <div class="pin-brand">LAWTON FITNESS</div>
  <div class="pin-tag">Personal Tracker</div>
  <div class="pin-label" id="pin-label">Enter your PIN</div>
  <div class="pin-info" id="pin-info"></div>
  <div class="pin-dots"><div class="pin-dot" id="d0"></div><div class="pin-dot" id="d1"></div><div class="pin-dot" id="d2"></div><div class="pin-dot" id="d3"></div></div>
  <div class="pin-error" id="pin-error"></div>
  <div class="pin-pad">
    <button class="pin-btn" onclick="pd('1')">1</button><button class="pin-btn" onclick="pd('2')">2</button><button class="pin-btn" onclick="pd('3')">3</button>
    <button class="pin-btn" onclick="pd('4')">4</button><button class="pin-btn" onclick="pd('5')">5</button><button class="pin-btn" onclick="pd('6')">6</button>
    <button class="pin-btn" onclick="pd('7')">7</button><button class="pin-btn" onclick="pd('8')">8</button><button class="pin-btn" onclick="pd('9')">9</button>
    <button class="pin-btn empty"></button><button class="pin-btn" onclick="pd('0')">0</button><button class="pin-btn" onclick="pb()">&#9003;</button>
  </div>
</div>
<div id="app" style="display:none">
  <div id="header">
    <div style="display:flex;align-items:center;gap:10px">
      <svg width="30" height="30" viewBox="0 0 80 80" fill="none"><polygon points="40,4 76,24 76,56 40,76 4,56 4,24" fill="#3b82f6" opacity="0.15"/><polygon points="40,4 76,24 76,56 40,76 4,56 4,24" fill="none" stroke="#3b82f6" stroke-width="2.5"/><polygon points="40,14 66,29 66,51 40,66 14,51 14,29" fill="#3b82f6" opacity="0.2"/><polygon points="40,22 58,33 58,47 40,58 22,47 22,33" fill="#3b82f6" opacity="0.28"/><text x="40" y="51" text-anchor="middle" fill="#3b82f6" font-size="24" font-weight="800" font-family="-apple-system,sans-serif">LF</text></svg>
      <div><div style="font-size:14px;font-weight:800;letter-spacing:1.5px;color:var(--text)">LAWTON FITNESS</div><div style="font-size:10px;color:var(--blue);font-weight:600;letter-spacing:1px">Personal Tracker</div></div>
    </div>
    <button class="btn-ghost" onclick="lockApp()" style="padding:7px 12px;font-size:12px">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>Lock
    </button>
  </div>
  <div id="nav">
    <button class="nav-btn active" onclick="sp('home')" id="nb-home"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>Home</button>
    <button class="nav-btn" onclick="sp('workouts')" id="nb-workouts"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"><path d="M6.5 6.5h11"/><path d="M6.5 17.5h11"/><path d="M3 9.5h3v5H3z"/><path d="M18 9.5h3v5h-3z"/><path d="M6.5 9.5v5"/><path d="M17.5 9.5v5"/></svg>Workouts</button>
    <button class="nav-btn" onclick="sp('nutrition')" id="nb-nutrition"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"><path d="M12 20.94c1.5 0 7-1.24 7-9.94C19 7.35 16.5 5 12 5s-7 2.35-7 6c0 8.7 5.5 9.94 7 9.94z"/><path d="M12 5c0-1.5.6-3 2-4"/></svg>Nutrition</button>
    <button class="nav-btn" onclick="sp('steps')" id="nb-steps"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"><path d="M4 16v-2.38C4 11.5 2.97 10.5 3 8c.03-2.72 1.49-6 4.5-6C9.5 2 10 3.5 10 5c0 1.5-.7 2.5-1 4s0 3 2 4"/><path d="M12 14c2 1 3.5 2 4 4"/><path d="M16 13c1 0 4 .5 4 2.5S18 19 16 19c-2 0-3-1-4-2"/></svg>Steps</button>
    <button class="nav-btn" onclick="sp('body')" id="nb-body"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>Body</button>
    <button class="nav-btn" onclick="sp('supplements')" id="nb-supplements"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"><path d="M10.5 20.5 3.5 13.5a5 5 0 0 1 7-7l7 7a5 5 0 0 1-7 7z"/><line x1="8.5" y1="8.5" x2="15.5" y2="15.5"/></svg>Supps</button>
    <button class="nav-btn" onclick="sp('goals')" id="nb-goals"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>Goals</button>
    <button class="nav-btn" onclick="sp('calendar')" id="nb-calendar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Calendar</button>
    <button class="nav-btn" onclick="sp('insights')" id="nb-insights"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Insights</button>
  </div>
  <div id="main">
    <div class="page active" id="pg-home"></div>

<script>
var DB={
  get:function(k){try{var v=localStorage.getItem('lf:'+k);return v?JSON.parse(v):null;}catch(e){return null;}},
  set:function(k,v){try{localStorage.setItem('lf:'+k,JSON.stringify(v));}catch(e){}},
  del:function(k){localStorage.removeItem('lf:'+k);}
};
var gid=function(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);};
var today=function(){return new Date().toISOString().split('T')[0];};
var fmtD=function(d){if(!d)return'';return new Date(d+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'});};
var fmtDL=function(d){if(!d)return'';return new Date(d+'T00:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});};
var greet=function(){var h=new Date().getHours();return h<12?'morning':h<17?'afternoon':'evening';};
var skm=function(s){return(s*0.000762).toFixed(1);};
var scal=function(s){return Math.round(s*0.04);};
var tvol=function(ex){if(!ex.sets)return 0;return ex.sets.reduce(function(t,s){return t+(s.w||0)*s.r;},0);};
var calcCals=function(p,c,f){return Math.round((p||0)*4+(c||0)*4+(f||0)*9);};
var curPage='home';

async function hashPin(p){
  var enc=new TextEncoder();
  var data=enc.encode(p+'lf-salt-v2');
  var hash=await crypto.subtle.digest('SHA-256',data);
  return Array.from(new Uint8Array(hash)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
}
function initPin(){
  var stored=DB.get('pin');
  if(!stored){
    pinMode='setup';
    document.getElementById('pin-label').textContent='Create your PIN';
    var i=document.getElementById('pin-info');
    i.style.display='block';
    i.textContent='Choose a 4-digit PIN to secure your app. You will enter this each time you open Lawton Fitness.';
  }else{
    pinMode='login';
    document.getElementById('pin-label').textContent='Enter your PIN';
  }
}
function pd(d){if(pinBuf.length>=4)return;pinBuf+=d;updDots();if(pinBuf.length===4)setTimeout(procPin,120);}
function pb(){pinBuf=pinBuf.slice(0,-1);updDots();document.getElementById('pin-error').textContent='';}
function updDots(){for(var i=0;i<4;i++){document.getElementById('d'+i).classList.toggle('filled',i<pinBuf.length);}}
async function procPin(){
  if(pinMode==='setup'){
    pinFirst=pinBuf;pinBuf='';updDots();
    document.getElementById('pin-label').textContent='Confirm your PIN';
    document.getElementById('pin-info').textContent='Enter the same PIN again to confirm.';
    pinMode='confirm';
  }else if(pinMode==='confirm'){
    if(pinBuf===pinFirst){
      DB.set('pin',await hashPin(pinBuf));
      pinBuf='';pinFirst='';
      document.getElementById('pin-error').textContent='';
      unlockApp();
    }else{
      document.getElementById('pin-error').textContent='PINs did not match. Try again.';
      pinBuf='';pinFirst='';updDots();
      pinMode='setup';
      document.getElementById('pin-label').textContent='Create your PIN';
      document.getElementById('pin-info').textContent='Choose a 4-digit PIN.';
    }
  }else{
    var h=await hashPin(pinBuf);
    var stored=DB.get('pin');
    if(h===stored){pinBuf='';document.getElementById('pin-error').textContent='';unlockApp();}
    else{document.getElementById('pin-error').textContent='Incorrect PIN';pinBuf='';updDots();}
  }
}
function unlockApp(){
  document.getElementById('pin-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  renderPage();
}
function lockApp(){
  document.getElementById('app').style.display='none';
  document.getElementById('pin-screen').style.display='flex';
  pinBuf='';updDots();
  document.getElementById('pin-error').textContent='';
  pinMode='login';
  document.getElementById('pin-label').textContent='Enter your PIN';
  document.getElementById('pin-info').style.display='none';
}

  document.getElementById('nb-'+name).classList.add('active');

  renderPage();
}

function ring(pct,sz,sw,col,lbl,fs){
  var r=(sz-sw)/2,circ=2*Math.PI*r,filled=circ*Math.min(1,pct/100);
  return '<div class="ring-wrap" style="width:'+sz+'px;height:'+sz+'px"><svg width="'+sz+'" height="'+sz+'"><circle cx="'+sz/2+'" cy="'+sz/2+'" r="'+r+'" fill="none" stroke="var(--bg4)" stroke-width="'+sw+'"/><circle cx="'+sz/2+'" cy="'+sz/2+'" r="'+r+'" fill="none" stroke="'+col+'" stroke-width="'+sw+'" stroke-dasharray="'+filled+' '+circ+'" stroke-linecap="round" style="transform:rotate(-90deg);transform-origin:50% 50%"/></svg><div class="ring-center" style="font-size:'+(fs||11)+'px;color:'+col+'">'+lbl+'</div></div>';
}

function renderHome(){

  var sp2=ts?Math.min(100,Math.round(ts.steps/ts.goal*100)):0;
  var as=U.filter(function(s){return s.active;});
  var ww=W.filter(function(w){return(Date.now()-new Date(w.date+'T00:00:00'))/86400000<=7;});
  var lw=W.slice().sort(function(a,b){return b.date.localeCompare(a.date);})[0];
  var latestBW=BW.slice().sort(function(a,b){return b.date.localeCompare(a.date);})[0];
  var h='<div style="margin-bottom:22px"><div style="font-size:13px;color:var(--text3);margin-bottom:4px">Good '+greet()+'</div><div style="font-size:26px;font-weight:800;color:var(--text);letter-spacing:-.5px">Coach Lawton</div></div>';
  h+='<div class="stats-2">';
  h+='<div class="stat-card"><div class="stat-val" style="color:var(--blue)">'+ww.length+'</div><div class="stat-lbl">Workouts this week</div></div>';
  h+='<div class="stat-card"><div class="stat-val" style="color:var(--amber)">'+(tn?tn.calories:'--')+'</div><div class="stat-lbl">Calories today</div></div>';
  h+='<div class="stat-card"><div class="stat-val" style="color:var(--teal)">'+(tn?tn.protein+'g':'--')+'</div><div class="stat-lbl">Protein today</div></div>';
  h+='<div class="stat-card"><div class="stat-val" style="color:var(--purple)">'+as.length+'</div><div class="stat-lbl">Active supps</div></div>';
  h+='</div>';
  h+='<div class="card" style="cursor:pointer" onclick="sp(\'steps\')"><span class="section-lbl">Steps Today</span><div style="display:flex;align-items:center;gap:18px">'+ring(sp2,80,8,sp2>=100?'var(--green)':'var(--blue)',sp2+'%',12)+'<div><div style="font-size:28px;font-weight:800;letter-spacing:-1px">'+(ts?ts.steps.toLocaleString():'--')+'</div><div style="font-size:12px;color:var(--text3);margin-top:3px">of '+(ts?ts.goal.toLocaleString():'10,000')+' goal</div>'+(ts?'<div style="display:flex;gap:14px;margin-top:8px"><span style="font-size:12px;color:var(--teal)">'+skm(ts.steps)+'km</span><span style="font-size:12px;color:var(--red)">'+scal(ts.steps)+' kcal</span></div>':'')+'</div></div></div>';
  if(latestBW){h+='<div class="card" style="cursor:pointer" onclick="sp(\'body\')"><span class="section-lbl">Body Weight</span><div style="display:flex;justify-content:space-between;align-items:center"><div style="font-size:28px;font-weight:800">'+latestBW.weight+'<span style="font-size:14px;color:var(--text3);font-weight:500">kg</span></div><div style="text-align:right"><div style="font-size:12px;color:var(--text3)">'+fmtD(latestBW.date)+'</div>'+(BW.length>1?'<div style="font-size:12px;color:'+(latestBW.weight<BW[BW.length-2]?.weight?'var(--green)':'var(--red)')+'">'+((latestBW.weight-BW.slice().sort(function(a,b){return b.date.localeCompare(a.date);})[1].weight)>0?'+':'')+(latestBW.weight-BW.slice().sort(function(a,b){return b.date.localeCompare(a.date);})[1].weight).toFixed(1)+'kg</div>':'')+'</div></div></div>';}
  if(lw){h+='<div class="card"><div class="card-hdr"><span class="section-lbl" style="margin:0">Last Workout</span><span class="card-date">'+fmtD(lw.date)+'</span></div><div style="font-size:16px;font-weight:700;margin-bottom:10px">'+lw.name+'</div>';lw.exercises.slice(0,3).forEach(function(ex){h+='<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)"><span style="font-size:13px;color:var(--text2)">'+ex.name+'</span><span style="font-size:12px;color:var(--text3)">'+ex.sets.length+' sets</span></div>';});if(lw.exercises.length>3)h+='<div style="font-size:12px;color:var(--text3);padding-top:8px">+' +(lw.exercises.length-3)+' more exercises</div>';h+='</div>';}
  if(G.length>0){var g=G[0];var pct=Math.min(100,Math.round(g.current/g.target*100));h+='<div class="card"><span class="section-lbl">Top Goal</span><div style="font-size:15px;font-weight:700;margin-bottom:12px">'+g.name+'</div><div class="prog-row"><div class="prog-bar"><div class="prog-fill" style="width:'+pct+'%"></div></div><span class="prog-pct">'+pct+'%</span></div><div style="font-size:12px;color:var(--text3);margin-top:6px">'+g.current+g.unit+' / '+g.target+g.unit+'</div></div>';}
  h+='<div class="stats-2" style="margin-top:4px">';
  h+='<button class="stat-card" style="cursor:pointer;text-align:left;border:1px solid var(--border2)" onclick="openWorkoutModal()"><div style="font-size:22px;margin-bottom:6px">&#x1F4AA;</div><div style="font-size:13px;font-weight:600;color:var(--text2)">Log Workout</div></div>';
  h+='<button class="stat-card" style="cursor:pointer;text-align:left;border:1px solid var(--border2)" onclick="openNutritionModal()"><div style="font-size:22px;margin-bottom:6px">&#x1F34E;</div><div style="font-size:13px;font-weight:600;color:var(--text2)">Log Nutrition</div></div>';
  h+='<button class="stat-card" style="cursor:pointer;text-align:left;border:1px solid var(--border2)" onclick="openStepsModal()"><div style="font-size:22px;margin-bottom:6px">&#x1F3C3;</div><div style="font-size:13px;font-weight:600;color:var(--text2)">Log Steps</div></div>';
  h+='<button class="stat-card" style="cursor:pointer;text-align:left;border:1px solid var(--border2)" onclick="openBodyModal()"><div style="font-size:22px;margin-bottom:6px">&#x2696;&#xFE0F;</div><div style="font-size:13px;font-weight:600;color:var(--text2)">Log Weight</div></div>';
  h+='</div>';
  document.getElementById('pg-home').innerHTML=h;
}
function renderWorkouts(){
  var W=(DB.get('workouts')||[]).slice().sort(function(a,b){return b.date.localeCompare(a.date);});
  var T=DB.get('templates')||[];
  var h='<div class="ph-row"><div><div class="page-title">Workouts</div><div class="page-sub">'+W.length+' sessions logged</div></div><div style="display:flex;gap:8px"><button class="btn-ghost" onclick="openTemplateModal()" style="padding:7px 12px;font-size:12px">Templates</button><button class="btn-soft" onclick="openWorkoutModal()">+ Log</button></div></div>';
  if(!W.length){h+='<div class="empty-state"><span class="empty-icon">&#x1F3CB;</span><div class="empty-text">No workouts yet</div><div class="empty-sub">Tap + to log your first session</div></div>';}
  else{W.forEach(function(w){
    var vol=w.exercises.reduce(function(t,e){return t+tvol(e);},0);
    var isE=expW===w.id;
    h+='<div class="card"><div style="display:flex;justify-content:space-between;cursor:pointer" onclick="toggleW(\''+w.id+'\')">';
    h+='<div><div class="card-date">'+fmtDL(w.date)+'</div><div class="card-title" style="margin-top:4px">'+w.name+'</div><div class="card-meta">'+w.duration+'min &middot; '+w.exercises.length+' exercises</div></div>';
    h+='<div style="text-align:right"><div style="font-size:18px;font-weight:800;color:var(--blue)">'+vol.toLocaleString()+'</div><div style="font-size:10px;color:var(--text3)">kg vol</div>';
    h+='<div style="display:flex;gap:6px;margin-top:8px;justify-content:flex-end"><button class="btn-icon" onclick="event.stopPropagation();editWorkout(\''+w.id+'\')" style="font-size:11px;padding:5px 8px">Edit</button></div></div></div>';
    if(isE){
      h+='<div class="expand-area">';
      w.exercises.forEach(function(ex){
        h+='<div style="margin-bottom:14px"><div class="ex-name-lbl">'+ex.name+'</div>';
        if(ex.type==='cardio'){h+='<div style="font-size:13px;color:var(--text2)">'+ex.duration+'min &middot; '+ex.cardioType+' &middot; '+(ex.bpm?ex.bpm+'bpm':'')+'</div>';}
        else{h+='<div class="set-chips">';ex.sets.forEach(function(s,j){h+='<div class="set-chip"><span class="set-chip-n">Set '+(j+1)+'</span><span class="set-chip-v">'+(s.w?s.w+'kg':'BW')+' x '+s.r+'</span></div>';});h+='</div>';}
        h+='</div>';
      });
      h+='<div style="display:flex;gap:8px"><button class="btn-ghost" onclick="copyWorkout(\''+w.id+'\')">Copy & Edit</button><button class="btn-danger" onclick="delW(\''+w.id+'\')">Delete</button></div>';
      h+='</div>';
    }
    h+='</div>';
  });}
  document.getElementById('pg-workouts').innerHTML=h;
}

function remEx(i){wEx.splice(i,1);renderExs();}
function addSet(i){wEx[i].sets.push({w:'',r:''});renderExs();}
function remSet(i,j){if(wEx[i].sets.length>1){wEx[i].sets.splice(j,1);renderExs();}}
function saveWorkout(){
  var name=document.getElementById('wn').value.trim();
  var date=document.getElementById('wd').value;
  var dur=Number(document.getElementById('wt').value)||45;
  if(!name){alert('Please enter a workout name');return;}
  var exercises=[];
  for(var i=0;i<wEx.length;i++){
    var ex=wEx[i];
    if(!ex.name.trim())continue;
    if(ex.type==='cardio'){
      exercises.push({name:ex.name,type:'cardio',duration:ex.duration||0,cardioType:ex.cardioType||'',bpm:ex.bpm||0});
    }else{
      var sets=[];
      for(var j=0;j<ex.sets.length;j++){
        var r=Number(ex.sets[j].r)||0;
        if(r>0)sets.push({w:Number(ex.sets[j].w)||0,r:r});
      }
      if(sets.length>0)exercises.push({name:ex.name.trim(),type:'strength',sets:sets});
    }
  }
  if(exercises.length===0){alert('Please add at least one exercise with sets');return;}
  var W=DB.get('workouts')||[];
  var editId=editCtx&&editCtx.id?editCtx.id:null;
  if(editId){
    for(var k=0;k<W.length;k++){
      if(W[k].id===editId){W[k]={id:editId,date:date,name:name,duration:dur,exercises:exercises};break;}
    }
  }else{
    var newW={id:gid(),date:date,name:name,duration:dur,exercises:exercises};
    W.unshift(newW);
    var T=DB.get('templates')||[];
    T.push({id:gid(),name:name,duration:dur,exercises:exercises});
    DB.set('templates',T);
  }
  DB.set('workouts',W);
  editCtx={};
  cm('mo-workout');
  renderPage();
}

function renderSteps(){
  var S=(DB.get('steps')||[]).slice().sort(function(a,b){return b.date.localeCompare(a.date);});
  var avg=S.length?Math.round(S.reduce(function(t,s){return t+s.steps;},0)/S.length):0;
  var tkm=S.reduce(function(t,s){return t+parseFloat(skm(s.steps));},0).toFixed(0);
  var hits=S.filter(function(s){return s.steps>=s.goal;}).length;
  var maxS=Math.max.apply(null,S.map(function(s){return s.steps;}).concat([1]));
  var h='<div class="ph-row"><div><div class="page-title">Steps</div><div class="page-sub">Daily activity tracking</div></div><button class="btn-soft" onclick="openStepsModal()">+ Log</button></div>';
  h+='<div class="stats-3"><div class="stat-card"><div class="stat-val" style="color:var(--teal)">'+avg.toLocaleString()+'</div><div class="stat-lbl">Daily avg</div></div><div class="stat-card"><div class="stat-val" style="color:var(--blue)">'+tkm+'km</div><div class="stat-lbl">Total dist</div></div><div class="stat-card"><div class="stat-val" style="color:var(--green)">'+hits+'/'+S.length+'</div><div class="stat-lbl">Goals hit</div></div></div>';
  if(S.length>0){var recent=S.slice(0,7).reverse();h+='<div class="card"><span class="section-lbl">Last 7 Days</span><div class="bar-chart">';recent.forEach(function(s){var ht=Math.round(s.steps/maxS*100);var hit=s.steps>=s.goal;h+='<div class="bar-col"><div class="bar-wrap"><div class="bar" style="height:'+ht+'%;background:'+(hit?'var(--blue)':'var(--bg4)');h+='"></div></div><div class="bar-lbl">'+fmtD(s.date).split(' ')[0]+'</div></div>';});h+='</div></div>';}
  if(!S.length){h+='<div class="empty-state"><span class="empty-icon">&#x1F3C3;</span><div class="empty-text">No steps logged</div><div class="empty-sub">Tap + to start tracking</div></div>';}
  else{S.forEach(function(s){var pct=Math.min(100,Math.round(s.steps/s.goal*100));var hit=s.steps>=s.goal;h+='<div class="card" style="'+(hit?'border-color:rgba(74,222,128,.25)':'')+'"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><div><div class="card-date">'+fmtDL(s.date)+'</div><div style="font-size:26px;font-weight:800;letter-spacing:-1px;margin-top:4px">'+s.steps.toLocaleString()+'</div></div>'+ring(pct,58,6,hit?'var(--green)':'var(--blue)',pct+'%',10)+'</div><div class="prog-row" style="margin-bottom:8px"><div class="prog-bar"><div class="prog-fill" style="width:'+pct+'%;background:'+(hit?'var(--green)':'var(--blue)')+'"></div></div><span class="prog-pct" style="color:'+(hit?'var(--green)':'var(--blue)')+'">'+pct+'%</span></div><div style="display:flex;justify-content:space-between;align-items:center"><div style="display:flex;gap:14px"><span style="font-size:12px;color:var(--teal)">'+skm(s.steps)+'km</span><span style="font-size:12px;color:var(--red)">'+scal(s.steps)+' kcal</span><span style="font-size:12px;color:var(--text3)">goal '+s.goal.toLocaleString()+'</span></div><div style="display:flex;gap:6px"><button class="btn-icon" style="font-size:11px;padding:5px 8px" onclick="editSteps(\''+s.id+'\')">Edit</button><button class="btn-danger" style="margin:0" onclick="delS(\''+s.id+'\')">Del</button></div></div></div>';});}
  document.getElementById('pg-steps').innerHTML=h;
}

function prevS(){var s=Number(document.getElementById('ss')?.value)||0;var g=Number(document.getElementById('sg')?.value)||10000;var p=document.getElementById('sprev');if(!p)return;if(s>0){p.innerHTML='<div style="background:var(--bg3);border-radius:12px;padding:12px;display:flex;gap:16px;margin-top:4px;justify-content:center"><div style="text-align:center"><div style="font-size:18px;font-weight:800;color:var(--teal)">'+skm(s)+'km</div><div style="font-size:10px;color:var(--text3)">Distance</div></div><div style="text-align:center"><div style="font-size:18px;font-weight:800;color:var(--red)">'+scal(s)+'</div><div style="font-size:10px;color:var(--text3)">Calories</div></div><div style="text-align:center"><div style="font-size:18px;font-weight:800;color:var(--blue)">'+Math.round(s/g*100)+'%</div><div style="font-size:10px;color:var(--text3)">of goal</div></div></div>';}else{p.innerHTML='';}}
function saveSteps(){
  var date=document.getElementById('sd').value;var steps=Number(document.getElementById('ss').value);var goal=Number(document.getElementById('sg').value)||10000;
  if(!steps){alert('Please enter your step count');return;}
  var all=DB.get('steps')||[];

    var firstBW=sortedBW[0];var lastBW=sortedBW[sortedBW.length-1];var bwDiff=(lastBW.weight-firstBW.weight).toFixed(1);
    var maxBW=Math.max.apply(null,sortedBW.map(function(b){return b.weight;}));var minBW=Math.min.apply(null,sortedBW.map(function(b){return b.weight;}));var bwRange=maxBW-minBW||1;
    h+='<div class="card"><span class="section-lbl">Weight Progress</span><div style="display:flex;justify-content:space-between;margin-bottom:14px"><div><div style="font-size:22px;font-weight:800;color:var(--blue)">'+lastBW.weight+'kg</div><div style="font-size:11px;color:var(--text3)">Current</div></div><div style="text-align:right"><div style="font-size:22px;font-weight:800;color:'+(bwDiff<0?'var(--green)':'var(--red)')+'\">'+(bwDiff>0?'+':'')+bwDiff+'kg</div><div style="font-size:11px;color:var(--text3)">Total change</div></div></div>';
    h+='<div class="bar-chart" style="height:60px">';
    sortedBW.slice(-14).forEach(function(b){var ht=Math.round(((b.weight-minBW)/bwRange)*70+30);h+='<div class="bar-col"><div class="bar-wrap"><div class="bar" style="height:'+ht+'%;background:var(--blue);opacity:.7"></div></div></div>';});
    h+='</div></div>';
  }
  h+='<div class="stats-3"><div class="stat-card"><div class="stat-val" style="color:var(--teal)">'+avgSteps.toLocaleString()+'</div><div class="stat-lbl">Avg daily steps</div></div><div class="stat-card"><div class="stat-val" style="color:var(--blue)">'+hitRate+'%</div><div class="stat-lbl">Step goal rate</div></div><div class="stat-card"><div class="stat-val" style="color:var(--purple)">'+W.length+'</div><div class="stat-lbl">Total workouts</div></div></div>';
  h+='<div class="card"><span class="section-lbl">Weekly Volume</span>';
  if(volData.length){h+='<div class="bar-chart">';volData.forEach(function(d){h+='<div class="bar-col"><div class="bar-wrap"><div class="bar" style="height:'+Math.round(d[1]/maxVol*100)+'%;background:var(--blue)"></div></div><div class="bar-lbl">'+d[0].split(' ')[0]+'</div></div>';});h+='</div>';}
  else{h+='<div style="color:var(--text3);font-size:13px;padding:12px 0">Log workouts to see trends</div>';}
  h+='</div>';
  if(Object.keys(bests).length){h+='<div class="card"><span class="section-lbl">Personal Bests</span>';Object.entries(bests).forEach(function(e){h+='<div class="pb-row"><span style="color:var(--text2);font-size:14px">'+e[0]+'</span><span style="color:var(--blue);font-weight:800;font-size:16px">'+e[1]+'kg</span></div>';});h+='</div>';}
  h+='<div class="card"><span class="section-lbl">Nutrition Averages</span><div class="inp2"><div style="background:var(--bg3);border-radius:12px;padding:14px"><div style="font-size:26px;font-weight:800;color:var(--amber)">'+avgCals+'</div><div style="font-size:11px;color:var(--text3)">Avg daily kcal</div></div><div style="background:var(--bg3);border-radius:12px;padding:14px"><div style="font-size:26px;font-weight:800;color:var(--teal)">'+avgPro+'g</div><div style="font-size:11px;color:var(--text3)">Avg daily protein</div></div></div></div>';
  if(G.length){h+='<div class="card"><span class="section-lbl">Goal Progress</span>';G.forEach(function(g){var pct=Math.min(100,Math.round(g.current/g.target*100));h+='<div style="margin-bottom:14px"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-size:13px;color:var(--text2)">'+g.name+'</span><span style="font-size:13px;font-weight:700;color:var(--blue)">'+pct+'%</span></div><div class="prog-bar"><div class="prog-fill" style="width:'+pct+'%"></div></div></div>';});h+='</div>';}
  document.getElementById('pg-insights').innerHTML=h;
}
initPin();
</script>
</body>
</html>
