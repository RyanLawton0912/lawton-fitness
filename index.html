<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Lawton Fitness"/>
<meta name="theme-color" content="#FF6B35"/>
<title>Lawton Fitness</title>
<style>
:root{
  --bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a26;--bg4:#1e1e2a;
  --border:#222;--border2:#2a2a3a;
  --text:#e8e8e8;--text2:#ccc;--text3:#888;--text4:#555;
  --orange:#FF6B35;--teal:#4ecdc4;--purple:#a78bfa;
  --yellow:#ffd93d;--red:#ff6b6b;--green:#06d6a0;
  --safe-top:env(safe-area-inset-top);
  --safe-bottom:env(safe-area-inset-bottom);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;font-family:'DM Sans',system-ui,sans-serif}
html,body{height:100%;background:var(--bg);color:var(--text);overscroll-behavior:none}
::-webkit-scrollbar{display:none}
input,textarea,button{font-family:inherit;font-size:inherit}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.5)}

/* ── Layout ── */
#app{display:flex;flex-direction:column;height:100vh;padding-top:var(–safe-top)}
#header{display:flex;justify-content:space-between;align-items:center;padding:16px 18px 10px;flex-shrink:0}
#nav{display:flex;gap:2px;padding:0 10px;overflow-x:auto;flex-shrink:0;scrollbar-width:none;border-bottom:1px solid var(–border)}
#main{flex:1;overflow-y:auto;padding:18px 16px calc(20px + var(–safe-bottom))}
.page{max-width:600px;margin:0 auto;display:none}
.page.active{display:block}

/* ── PIN Screen ── */
#pin-screen{position:fixed;inset:0;background:var(–bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;z-index:1000;padding-top:var(–safe-top)}
.pin-logo{margin-bottom:8px}
.pin-brand{font-size:22px;font-weight:900;letter-spacing:4px;color:#fff;margin-bottom:4px}
.pin-tag{font-size:12px;color:var(–text4);letter-spacing:2px;margin-bottom:36px}
.pin-label{font-size:11px;font-weight:700;color:var(–text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:20px;text-align:center}
.pin-dots{display:flex;gap:16px;margin-bottom:12px}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid #333;background:var(–bg4);transition:background .15s,border .15s}
.pin-dot.filled{background:var(–orange);border-color:var(–orange)}
.pin-error{color:var(–red);font-size:13px;margin-bottom:12px;min-height:20px;text-align:center}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:280px;margin-top:8px}
.pin-btn{background:var(–bg2);border:1px solid var(–border);border-radius:14px;padding:18px;font-size:22px;font-weight:700;color:#fff;cursor:pointer;transition:background .1s;-webkit-user-select:none}
.pin-btn:active{background:var(–bg3)}
.pin-btn.empty{opacity:0;pointer-events:none}
.pin-setup-info{font-size:12px;color:var(–text4);text-align:center;max-width:260px;line-height:1.6;margin-bottom:16px}

/* ── Header ── */
.logo-wrap{display:flex;align-items:center;gap:10px}
.brand-small{font-size:14px;font-weight:900;letter-spacing:2px;color:#fff}
.brand-role{font-size:10px;color:var(–orange);font-weight:700;letter-spacing:1px}
.header-btn{background:var(–bg3);border:1px solid var(–border);border-radius:10px;padding:8px 10px;color:var(–text3);cursor:pointer;display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600}

/* ── Nav ── */
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 10px;border-radius:10px;border:none;background:transparent;color:var(–text4);cursor:pointer;font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;min-width:48px;transition:all .2s;white-space:nowrap;flex-shrink:0}
.nav-btn svg{width:18px;height:18px}
.nav-btn.active{background:#FF6B3518;color:var(–orange);outline:1px solid #FF6B3533}

/* ── Cards ── */
.card{background:var(–bg2);border:1px solid var(–border);border-radius:16px;padding:18px;margin-bottom:12px;transition:border-color .15s}
.card:active{transform:scale(.99)}
.section-label{font-size:11px;color:var(–text3);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px;display:block}
.page-title{font-size:24px;font-weight:800;color:#fff;letter-spacing:-1px;margin-bottom:16px}
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.card-date{font-size:11px;color:var(–text3);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.card-name{font-size:16px;font-weight:700;color:#fff;margin-bottom:4px}
.card-meta{font-size:12px;color:var(–text4)}
.empty{color:var(–text4);text-align:center;padding:48px 0;font-size:14px}

/* ── Stat grid ── */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.stat-card{background:var(–bg2);border:1px solid var(–border);border-radius:16px;padding:16px}
.stat-val{font-size:28px;font-weight:900;letter-spacing:-1px}
.stat-lbl{font-size:11px;color:var(–text4);margin-top:6px}

/* ── Progress bar ── */
.prog-row{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.prog-bar{flex:1;background:var(–bg4);border-radius:6px;height:8px;overflow:hidden}
.prog-fill{height:100%;border-radius:6px;background:var(–orange);transition:width .6s ease}
.prog-pct{font-weight:700;font-size:14px;color:var(–orange);min-width:36px;text-align:right}
.prog-meta{font-size:12px;color:var(–text4)}

/* ── Ring ── */
.ring-wrap{position:relative;flex-shrink:0}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:#fff}

/* ── Buttons ── */
.btn-primary{background:var(–orange);border:none;border-radius:14px;padding:14px;color:#fff;font-size:16px;font-weight:900;cursor:pointer;width:100%;letter-spacing:.5px;margin-top:8px}
.btn-primary:active{opacity:.85}
.btn-add{display:flex;align-items:center;gap:6px;background:#FF6B3522;border:1px solid #FF6B3566;border-radius:10px;padding:7px 14px;color:var(–orange);cursor:pointer;font-size:12px;font-weight:700}
.btn-icon{background:var(–bg4);border:1px solid var(–border2);border-radius:8px;padding:6px 8px;color:var(–text3);cursor:pointer}
.btn-delete{display:flex;align-items:center;gap:6px;background:#ff6b6b18;border:1px solid #ff6b6b44;border-radius:10px;padding:8px 14px;color:var(–red);cursor:pointer;font-size:12px;font-weight:600;margin-top:12px}
.btn-update{background:#FF6B3522;border:1px solid #FF6B3566;border-radius:8px;padding:6px 12px;color:var(–orange);cursor:pointer;font-size:12px;font-weight:700}
.btn-sm{background:transparent;border:1px solid var(–border2);border-radius:8px;padding:6px 12px;color:var(–text3);cursor:pointer;font-size:12px}
.btn-sm.active{border-color:#FF6B3566;color:var(–orange);background:#FF6B3514}
.qa-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}
.qa-btn{display:flex;align-items:center;gap:10px;padding:14px 16px;background:var(–bg2);border:1px solid var(–border);border-radius:14px;color:var(–text2);cursor:pointer;font-size:13px;font-weight:600}
.qa-btn:active{background:var(–bg3)}

/* ── FAB ── */
#fab{position:fixed;bottom:calc(80px + var(–safe-bottom));right:24px;width:56px;height:56px;border-radius:50%;background:var(–orange);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 24px #FF6B3566;z-index:100;transition:transform .15s}
#fab:active{transform:scale(.92)}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:#000b;backdrop-filter:blur(8px);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;transition:opacity .2s;pointer-events:none}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal-box{background:#13131c;border:1px solid var(–border);border-radius:22px 22px 0 0;width:100%;max-width:560px;max-height:92vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
.modal-overlay.open .modal-box{transform:translateY(0)}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:18px 20px 14px;border-bottom:1px solid var(–bg4);flex-shrink:0}
.modal-title{font-size:17px;font-weight:800;color:#fff}
.modal-body{padding:16px 18px calc(32px + var(–safe-bottom));overflow-y:auto;display:flex;flex-direction:column;gap:12px}

/* ── Form ── */
.label{font-size:11px;font-weight:700;color:var(–text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;display:block}
.input{width:100%;background:var(–bg4);border:1px solid var(–border2);border-radius:10px;padding:12px 14px;color:#fff;font-size:15px;outline:none;transition:border-color .15s}
.input:focus{border-color:#FF6B3566}
textarea.input{resize:vertical;min-height:80px;font-family:inherit}
.input-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.set-input{background:var(–bg);border:1px solid var(–border2);border-radius:8px;padding:10px;color:#fff;font-size:14px;outline:none;text-align:center;width:100%}
.set-input:focus{border-color:#FF6B3566}
.ex-block{background:var(–bg3);border-radius:12px;padding:14px;margin-bottom:10px}
.sets-grid{display:grid;grid-template-columns:28px 1fr 1fr;gap:8px;align-items:center;margin-bottom:8px}
.set-num{font-size:11px;color:var(–text4);font-weight:700;text-align:center}
.toggle{width:44px;height:26px;border-radius:13px;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;border:none}
.toggle-thumb{position:absolute;top:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 4px #0006}
.color-swatch{width:30px;height:30px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:border .15s;flex-shrink:0}
.color-swatch.selected{border-color:#fff}
.supp-pill{border-radius:20px;padding:6px 12px;font-size:12px;font-weight:600;border:1px solid;display:inline-block}
.badge{display:inline-block;border-radius:6px;padding:3px 8px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px}

/* ── Bar chart ── */
.bar-chart{display:flex;gap:6px;align-items:flex-end;height:90px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%}
.bar-wrap{flex:1;width:100%;display:flex;align-items:flex-end}
.bar{width:100%;border-radius:4px 4px 0 0;min-height:4px;transition:height .6s cubic-bezier(.4,0,.2,1)}
.bar-lbl{font-size:9px;color:var(–text4);text-align:center}

/* ── Workout expand ── */
.expand-area{margin-top:14px;padding-top:14px;border-top:1px solid var(–bg4)}
.ex-row-view{margin-bottom:12px}
.ex-row-name{font-size:12px;font-weight:700;color:var(–orange);margin-bottom:8px}
.sets-chips{display:flex;flex-wrap:wrap;gap:8px}
.set-chip{background:var(–bg4);border-radius:8px;padding:6px 10px}
.set-chip-num{font-size:10px;color:var(–text4);display:block;margin-bottom:2px}
.set-chip-val{font-size:13px;font-weight:700}

/* ── Macro chips ── */
.macro-row{display:flex;gap:10px;flex-wrap:wrap}
.macro-chip{display:flex;align-items:center;gap:6px}
.macro-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.macro-val{font-size:14px;font-weight:800}
.macro-lbl{font-size:10px;color:var(–text4)}

/* ── Steps ── */
.steps-big{font-size:28px;font-weight:900;letter-spacing:-1px;color:#fff}

/* ── Insights ── */
.pb-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(–bg4)}

/* ── Checkin stars ── */
.star-row{display:flex;gap:8px}
.star-btn{flex:1;padding:12px;border-radius:10px;border:2px solid var(–border2);background:transparent;cursor:pointer;font-size:16px;transition:all .15s}

@media(prefers-color-scheme:dark){body{background:var(–bg)}}
</style>

</head>

// ═══════════════════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════════════════
const DB = {
  get(k){try{const v=localStorage.getItem('lf:'+k);return v?JSON.parse(v):null}catch{return null}},
  set(k,v){try{localStorage.setItem('lf:'+k,JSON.stringify(v))}catch(e){console.error(e)}},
  del(k){localStorage.removeItem('lf:'+k)}
};

// ═══════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════
const today = () => new Date().toISOString().split('T')[0];
const fmtDate = d => {
  if(!d) return '';
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
};
const greeting = () => {const h=new Date().getHours();return h<12?'morning':h<17?'afternoon':'evening'};
const stepsKm = s => (s*0.000762).toFixed(1);
const stepsCal = s => Math.round(s*0.04);
const totalVol = ex => ex.sets.reduce((t,s)=>t+(s.w||0)*s.r,0);
const genId = () => Date.now() + Math.random().toString(36).slice(2,6);

// Simple hash for PIN security (not cryptographic but better than plaintext)
async function hashPin(pin) {
  const encoder = new TextEncoder();
  const data = encoder.encode(pin + 'lf-salt-2024');
  const hash = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// ═══════════════════════════════════════════════════
// PIN SYSTEM
// ═══════════════════════════════════════════════════
let pinBuffer = '';
let pinMode = 'login'; // login | setup | confirm
let pinFirst = '';

function initPin() {
  const stored = DB.get('pin');
  if (!stored) {
    pinMode = 'setup';
    document.getElementById('pin-label').textContent = 'Create your PIN';
    document.getElementById('pin-setup-info').style.display = 'block';
    document.getElementById('pin-setup-info').textContent = 'Choose a 4-digit PIN to secure your app. You\'ll enter this every time you open Lawton Fitness.';
  } else {
    pinMode = 'login';
    document.getElementById('pin-label').textContent = 'Enter your PIN';
  }
}

function pinDigit(d) {
  if (pinBuffer.length >= 4) return;
  pinBuffer += d;
  updatePinDots();
  if (pinBuffer.length === 4) {
    setTimeout(() => processPinEntry(), 100);
  }
}

function pinBack() {
  pinBuffer = pinBuffer.slice(0, -1);
  updatePinDots();
  document.getElementById('pin-error').textContent = '';
}

function updatePinDots() {
  for (let i = 0; i < 4; i++) {
    document.getElementById('d'+i).classList.toggle('filled', i < pinBuffer.length);
  }
}

async function processPinEntry() {
  if (pinMode === 'setup') {
    pinFirst = pinBuffer;
    pinBuffer = '';
    updatePinDots();
    document.getElementById('pin-label').textContent = 'Confirm your PIN';
    document.getElementById('pin-setup-info').textContent = 'Enter your PIN again to confirm.';
    pinMode = 'confirm';
  } else if (pinMode === 'confirm') {
    if (pinBuffer === pinFirst) {
      const hashed = await hashPin(pinBuffer);
      DB.set('pin', hashed);
      pinBuffer = '';
      pinFirst = '';
      document.getElementById('pin-error').textContent = '';
      unlockApp();
    } else {
      document.getElementById('pin-error').textContent = 'PINs don\'t match. Try again.';
      pinBuffer = '';
      pinFirst = '';
      updatePinDots();
      pinMode = 'setup';
      document.getElementById('pin-label').textContent = 'Create your PIN';
      document.getElementById('pin-setup-info').textContent = 'Choose a 4-digit PIN to secure your app.';
    }
  } else {
    const hashed = await hashPin(pinBuffer);
    const stored = DB.get('pin');
    if (hashed === stored) {
      pinBuffer = '';
      document.getElementById('pin-error').textContent = '';
      unlockApp();
    } else {
      document.getElementById('pin-error').textContent = 'Incorrect PIN';
      pinBuffer = '';
      updatePinDots();
    }
  }
}

function unlockApp() {
  document.getElementById('pin-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  renderCurrentPage();
}

function lockApp() {
  document.getElementById('app').style.display = 'none';
  document.getElementById('pin-screen').style.display = 'flex';
  pinBuffer = '';
  updatePinDots();
  document.getElementById('pin-error').textContent = '';
  pinMode = 'login';
  document.getElementById('pin-label').textContent = 'Enter your PIN';
  document.getElementById('pin-setup-info').style.display = 'none';
}

let currentPage = 'dashboard';

function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
  currentPage = name;
  document.getElementById('main').scrollTop = 0;
  renderCurrentPage();
}

function renderCurrentPage() {
  const renders = {
    dashboard: renderDashboard,
    workouts: renderWorkouts,
    nutrition: renderNutrition,
    steps: renderSteps,
    supplements: renderSupplements,
    goals: renderGoals,
    insights: renderInsights
  };
  if (renders[currentPage]) renders[currentPage]();
}

function fabAction() {
  const actions = {
    dashboard: () => openWorkoutModal(),
    workouts: () => openWorkoutModal(),
    nutrition: () => openNutritionModal(),
    steps: () => openStepsModal(),
    supplements: () => openSupplementModal(),
    goals: () => openGoalModal(),
    insights: null
  };
  const a = actions[currentPage];
  if (a) a();
}

function openModal(id) {

  m.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal(id) {
  const m = document.getElementById(id);
  m.classList.remove('open');
  document.body.style.overflow = '';
}

});

function ringHtml(pct, size, stroke, color, label) {
  const r = (size - stroke) / 2;
  const circ = 2 * Math.PI * r;
  const filled = circ * Math.min(1, pct / 100);
  return `<div class="ring-wrap" style="width:${size}px;height:${size}px">
    <svg width="${size}" height="${size}" style="transform:rotate(-90deg)">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#1e1e2a" stroke-width="${stroke}"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}" stroke-dasharray="${filled} ${circ}" stroke-linecap="round"/>
    </svg>
    <div class="ring-center" style="font-size:${size<70?10:12}px;color:${color}">${label}</div>
  </div>`;
}

// WORKOUTS

let expandedWorkout = null;

function renderWorkouts() {
  const workouts = (DB.get('workouts') || []).sort((a,b)=>b.date.localeCompare(a.date));
  let html = `
    <div class="page-header">
      <div class="page-title">Workouts</div>
      <button class="btn-add" onclick="openWorkoutModal()">+ Log</button>
    </div>`;

  if (!workouts.length) {
    html += `<div class="empty">No workouts yet.<br>Tap + to log your first session.</div>`;
  } else {
    workouts.forEach(w => {
      const vol = w.exercises.reduce((t,e)=>t+totalVol(e),0);
      const isExp = expandedWorkout === w.id;
      html += `
        <div class="card">
          <div style="display:flex;justify-content:space-between;cursor:pointer" onclick="toggleWorkout('${w.id}')">
            <div>
              <div class="card-date">${fmtDate(w.date)}</div>
              <div class="card-name">${w.name}</div>
              <div class="card-meta">${w.duration}min · ${w.exercises.length} exercises</div>
            </div>
            <div style="text-align:right">
              <div style="font-size:18px;font-weight:900;color:var(--orange)">${vol.toLocaleString()}</div>
              <div style="font-size:10px;color:var(--text4)">kg vol.</div>
            </div>
          </div>
          ${isExp ? `<div class="expand-area">
            ${w.exercises.map(ex=>`
              <div class="ex-row-view">
                <div class="ex-row-name">${ex.name}</div>
                <div class="sets-chips">
                  ${ex.sets.map((s,j)=>`<div class="set-chip">
                    <span class="set-chip-num">Set ${j+1}</span>
                    <span class="set-chip-val">${s.w?s.w+'kg':'BW'} × ${s.r}</span>
                  </div>`).join('')}
                </div>
              </div>`).join('')}
            <button class="btn-delete" onclick="deleteWorkout('${w.id}')">🗑 Delete</button>
          </div>` : ''}
        </div>`;
    });
  }
  document.getElementById('page-workouts').innerHTML = html;
}

function toggleWorkout(id) {
  expandedWorkout = expandedWorkout === id ? null : id;
  renderWorkouts();
}

function deleteWorkout(id) {
  if (!confirm('Delete this workout?')) return;
  const workouts = (DB.get('workouts') || []).filter(w => w.id !== id);
  DB.set('workouts', workouts);
  renderWorkouts();
}

// Workout Modal
let wExercises = [];

function openWorkoutModal() {
  wExercises = [{ name: '', sets: [{ w: '', r: '' }] }];
  renderWorkoutModal();
  openModal('modal-workout');
}

function renderWorkoutModal() {
  const body = document.getElementById('modal-workout-body');
  body.innerHTML = `
    <label class="label">Workout Name</label>
    <input class="input" id="w-name" placeholder="e.g. Push Day"/>
    <div class="input-grid-2">
      <div><label class="label">Date</label><input class="input" type="date" id="w-date" value="${today()}"/></div>
      <div><label class="label">Duration (min)</label><input class="input" type="number" id="w-dur" value="45"/></div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <label class="label" style="margin:0">Exercises</label>
      <button class="btn-sm" onclick="addExercise()">+ Add Exercise</button>
    </div>
    <div id="w-exercises"></div>
    <button class="btn-primary" onclick="saveWorkout()">Save Workout</button>`;
  renderExercises();
}

function renderExercises() {
  const container = document.getElementById('w-exercises');
  if (!container) return;
  container.innerHTML = wExercises.map((ex, i) => `
    <div class="ex-block">
      <div style="display:flex;gap:8px;margin-bottom:10px">
        <input class="input" style="flex:1" placeholder="Exercise name" value="${ex.name}"
          oninput="wExercises[${i}].name=this.value"/>
        ${wExercises.length>1?`<button class="btn-icon" onclick="removeExercise(${i})">✕</button>`:''}
      </div>
      <div style="display:grid;grid-template-columns:28px 1fr 1fr;gap:8px;margin-bottom:6px">
        <span style="font-size:10px;color:var(--text4);text-align:center">#</span>
        <span style="font-size:10px;color:var(--text4)">Weight (kg)</span>
        <span style="font-size:10px;color:var(--text4)">Reps</span>
      </div>
      ${ex.sets.map((s,j)=>`
        <div class="sets-grid" style="margin-bottom:8px">
          <span class="set-num">${j+1}</span>
          <input class="set-input" type="number" placeholder="0" value="${s.w}"
            oninput="wExercises[${i}].sets[${j}].w=Number(this.value)"/>
          <input class="set-input" type="number" placeholder="0" value="${s.r}"
            oninput="wExercises[${i}].sets[${j}].r=Number(this.value)"/>
        </div>`).join('')}
      <button class="btn-sm" onclick="addSet(${i})">+ Add Set</button>
    </div>`).join('');
}

function addExercise() {
  wExercises.push({ name: '', sets: [{ w: '', r: '' }] });
  renderExercises();
}
function removeExercise(i) {
  wExercises.splice(i, 1);
  renderExercises();
}
function addSet(i) {
  wExercises[i].sets.push({ w: '', r: '' });
  renderExercises();
}

function saveWorkout() {
  const name = document.getElementById('w-name').value.trim();
  const date = document.getElementById('w-date').value;
  const dur = Number(document.getElementById('w-dur').value) || 45;
  if (!name) { alert('Please enter a workout name'); return; }
  const exercises = wExercises
    .filter(e => e.name.trim())
    .map(e => ({ name: e.name.trim(), sets: e.sets.filter(s=>s.r>0).map(s=>({w:s.w||0,r:s.r})) }))
    .filter(e => e.sets.length);
  if (!exercises.length) { alert('Please add at least one exercise with sets'); return; }
  const workouts = DB.get('workouts') || [];
  workouts.unshift({ id: genId(), date, name, duration: dur, exercises });
  DB.set('workouts', workouts);
  closeModal('modal-workout');
  renderCurrentPage();
}

function saveNutrition() {
  const date = document.getElementById('n-date').value;
  const calories = Number(document.getElementById('n-cal').value)||0;
  const protein = Number(document.getElementById('n-pro').value)||0;
  const carbs = Number(document.getElementById('n-carb').value)||0;
  const fat = Number(document.getElementById('n-fat').value)||0;
  if (!calories) { alert('Please enter calories'); return; }
  const meals = nMeals.filter(m=>m.name).map(m=>({name:m.name,items:m.items.split(',').map(s=>s.trim()).filter(Boolean)}));
  const nutrition = DB.get('nutrition') || [];
  nutrition.unshift({ id: genId(), date, calories, protein, carbs, fat, meals });
  DB.set('nutrition', nutrition);
  closeModal('modal-nutrition');
  renderCurrentPage();
}

// ═══════════════════════════════════════════════════
// STEPS
// ═══════════════════════════════════════════════════
function renderSteps() {
  const steps = (DB.get('steps') || []).sort((a,b)=>b.date.localeCompare(a.date));
  const avg = steps.length ? Math.round(steps.reduce((t,s)=>t+s.steps,0)/steps.length) : 0;
  const totalKm = steps.reduce((t,s)=>t+parseFloat(stepsKm(s.steps)),0).toFixed(0);
  const hits = steps.filter(s=>s.steps>=s.goal).length;
  const maxS = Math.max(...steps.map(s=>s.steps), 1);

  let html = `
    <div class="page-header">
      <div class="page-title">Steps</div>
      <button class="btn-add" onclick="openStepsModal()">+ Log</button>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px">
      ${[['Daily Avg',avg.toLocaleString(),'var(--teal)'],['Total km',totalKm+'km','var(--orange)'],['Goals Hit',hits+'/'+steps.length,'var(--purple)']].map(([l,v,c])=>`
      <div class="stat-card" style="padding:14px 10px">
        <div style="font-size:18px;font-weight:900;color:${c}">${v}</div>
        <div style="font-size:10px;color:var(--text4);margin-top:4px">${l}</div>
      </div>`).join('')}
    </div>`;

  if (steps.length > 0) {
    const recent = steps.slice(0,7).reverse();
    html += `<div class="card">
      <span class="section-label">Last 7 Days</span>
      <div class="bar-chart">
        ${recent.map(s=>{
          const h = Math.round(s.steps/maxS*100);
          const hit = s.steps>=s.goal;
          return `<div class="bar-col">
            <div class="bar-wrap"><div class="bar" style="height:${h}%;background:${hit?'linear-gradient(180deg,var(--orange),#c44)':'linear-gradient(180deg,var(--teal),#2a8a88)'}"></div></div>
            <div class="bar-lbl">${fmtDate(s.date).split(' ')[0]}</div>
          </div>`;
        }).join('')}
      </div>
      <div style="display:flex;gap:16px;margin-top:12px">
        <div style="display:flex;align-items:center;gap:6px"><div style="width:10px;height:10px;border-radius:2px;background:var(--orange)"></div><span style="font-size:11px;color:var(--text3)">Goal hit</span></div>
        <div style="display:flex;align-items:center;gap:6px"><div style="width:10px;height:10px;border-radius:2px;background:var(--teal)"></div><span style="font-size:11px;color:var(--text3)">Below goal</span></div>
      </div>
    </div>`;
  }

  if (!steps.length) {
    html += `<div class="empty">No steps logged yet.<br>Tap + to start tracking.</div>`;
  } else {
    steps.forEach(s => {
      const pct = Math.min(100, Math.round(s.steps/s.goal*100));
      const hit = s.steps >= s.goal;
      html += `
        <div class="card" style="${hit?'border-color:#FF6B3544;background:#FF6B3508':''}">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
            <div>
              <div class="card-date">${fmtDate(s.date)}</div>
              <div class="steps-big">${s.steps.toLocaleString()} <span style="font-size:14px;color:var(--text4);font-weight:400">steps</span></div>
            </div>
            ${ringHtml(pct, 58, 6, hit?'var(--orange)':'var(--teal)', pct+'%')}
          </div>
          <div class="prog-bar" style="margin-bottom:10px"><div class="prog-fill" style="width:${pct}%;background:${hit?'var(--orange)':'var(--teal)'}"></div></div>
          <div style="display:flex;gap:14px">
            <span style="font-size:12px;color:var(--teal)">🏃 ${stepsKm(s.steps)} km</span>
            <span style="font-size:12px;color:var(--red)">🔥 ${stepsCal(s.steps)} kcal</span>
            <span style="font-size:12px;color:var(--text4)">Goal: ${s.goal.toLocaleString()}</span>
          </div>
          <button class="btn-delete" onclick="deleteSteps('${s.id}')">🗑 Delete</button>
        </div>`;
    });
  }
  document.getElementById('page-steps').innerHTML = html;
}

function deleteSteps(id) {
  if (!confirm('Delete this entry?')) return;
  DB.set('steps', (DB.get('steps')||[]).filter(s=>s.id!==id));

function saveSteps() {

  DB.set('steps', all);
  closeModal('modal-steps');
  renderCurrentPage();
}

// ═══════════════════════════════════════════════════
function renderSupplements() {
  const supplements = DB.get('supplements') || [];
  const active = supplements.filter(s=>s.active);
  const groups = {};
  active.forEach(s=>{ if(!groups[s.timing]) groups[s.timing]=[]; groups[s.timing].push(s); });

  let html = `
    <div class="page-header">
      <div class="page-title">Supplements</div>
      <button class="btn-add" onclick="openSupplementModal()">+ Add</button>
    </div>
    <div class="stats-grid" style="margin-bottom:14px">
      <div class="stat-card"><div class="stat-val" style="color:var(--purple)">${active.length}</div><div class="stat-lbl">Active</div></div>
      <div class="stat-card"><div class="stat-val" style="color:var(--text4)">${supplements.filter(s=>!s.active).length}</div><div class="stat-lbl">Paused</div></div>
    </div>`;

  if (Object.keys(groups).length > 0) {
    html += `<div class="card"><span class="section-label">Today's Schedule</span>`;
    Object.entries(groups).forEach(([timing, supps]) => {
      html += `<div style="margin-bottom:12px">
        <div style="font-size:10px;color:var(--text4);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">${timing}</div>
        <div style="display:flex;flex-wrap:wrap;gap:8px">
          ${supps.map(s=>`<div class="supp-pill" style="border-color:${s.color}66;color:${s.color};background:${s.color}15">${s.name} <span style="opacity:.7">${s.dose}</span></div>`).join('')}
        </div>
      </div>`;
    });
    html += `</div>`;
  }

  if (!supplements.length) {
    html += `<div class="empty">No supplements added yet.<br>Tap + to add your first.</div>`;
  } else {
    supplements.forEach(s => {
      html += `
        <div class="card" style="${s.active?`border-color:${s.color}44`:'opacity:.55'}">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div style="display:flex;align-items:center;gap:12px">
              <div style="width:44px;height:44px;border-radius:12px;background:${s.color}22;border:2px solid ${s.color}44;display:flex;align-items:center;justify-content:center;font-size:20px">💊</div>
              <div>
                <div style="font-size:15px;font-weight:700;color:#fff">${s.name}</div>
                <div style="font-size:12px;color:var(--text3);margin-top:2px">${s.dose} · ${s.timing}</div>
              </div>
            </div>
            <div style="display:flex;gap:8px;align-items:center">
              <button class="toggle" style="background:${s.active?s.color:'var(--bg4)'}" onclick="toggleSupp('${s.id}')">
                <div class="toggle-thumb" style="transform:translateX(${s.active?21:3}px)"></div>
              </button>
              <button class="btn-icon" onclick="deleteSupp('${s.id}')">🗑</button>
            </div>
          </div>
        </div>`;
    });
  }
  document.getElementById('page-supplements').innerHTML = html;
}

  const supps = DB.get('supplements') || [];
  DB.set('supplements', supps.map(s=>s.id===id?{...s,active:!s.active}:s));

function deleteSupp(id) {

// ═══════════════════════════════════════════════════
// INSIGHTS
// ═══════════════════════════════════════════════════
function renderInsights() {
  const workouts = DB.get('workouts') || [];
  const nutrition = DB.get('nutrition') || [];
  const steps = DB.get('steps') || [];
  const goals = DB.get('goals') || [];

  // Weekly volume
  const volByWeek = {};
  workouts.forEach(w => {
    const d = new Date(w.date+'T00:00:00');
    const start = new Date(d);
    start.setDate(d.getDate()-d.getDay());
    const key = start.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
    volByWeek[key] = (volByWeek[key]||0) + w.exercises.reduce((t,e)=>t+totalVol(e),0);
  });
  const volData = Object.entries(volByWeek).slice(-6);
  const maxVol = Math.max(...volData.map(d=>d[1]), 1);

  // Best lifts
  const bests = {};
  workouts.forEach(w=>w.exercises.forEach(ex=>ex.sets.forEach(s=>{
    if(s.w>0 && (!bests[ex.name]||s.w>bests[ex.name])) bests[ex.name]=s.w;
  })));

  // Nutrition averages
  const avgCals = nutrition.length ? Math.round(nutrition.reduce((t,n)=>t+n.calories,0)/nutrition.length) : 0;
  const avgPro = nutrition.length ? Math.round(nutrition.reduce((t,n)=>t+n.protein,0)/nutrition.length) : 0;

  // Steps
  const avgSteps = steps.length ? Math.round(steps.reduce((t,s)=>t+s.steps,0)/steps.length) : 0;
  const stepHitRate = steps.length ? Math.round(steps.filter(s=>s.steps>=s.goal).length/steps.length*100) : 0;

  let html = `<div class="page-title">Insights</div>`;

  // Steps summary
  html += `<div class="card">
    <span class="section-label">Step Goals</span>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
      ${[['Avg Steps',avgSteps.toLocaleString(),'var(--teal)'],['Goal Rate',stepHitRate+'%','var(--orange)'],['Days',steps.length,'var(--purple)']].map(([l,v,c])=>`
      <div style="background:var(--bg4);border-radius:12px;padding:12px;text-align:center">
        <div style="font-size:20px;font-weight:900;color:${c}">${v}</div>
        <div style="font-size:10px;color:var(--text4);margin-top:4px">${l}</div>
      </div>`).join('')}
    </div>
  </div>`;

  // Volume chart
  html += `<div class="card">
    <span class="section-label">Weekly Training Volume</span>
    ${volData.length > 0 ? `<div class="bar-chart">
      ${volData.map(([week,vol])=>`<div class="bar-col">
        <div class="bar-wrap"><div class="bar" style="height:${Math.round(vol/maxVol*100)}%;background:linear-gradient(180deg,var(--orange),#c44)"></div></div>
        <div class="bar-lbl">${week.split(' ')[0]}</div>
      </div>`).join('')}
    </div>` : `<div style="color:var(--text4);font-size:13px;padding:16px 0">Log workouts to see volume trends</div>`}
  </div>`;

  // Personal bests
  html += `<div class="card">
    <span class="section-label">Personal Bests</span>
    ${Object.keys(bests).length ? Object.entries(bests).map(([name,w])=>`
      <div class="pb-row">
        <span style="color:var(--text2);font-size:14px">${name}</span>
        <span style="color:var(--orange);font-weight:800;font-size:16px">${w}kg</span>
      </div>`).join('') : `<div style="color:var(--text4);font-size:13px;padding:8px 0">No lift data yet</div>`}
  </div>`;

  // Nutrition averages
  html += `<div class="card">
    <span class="section-label">Nutrition Averages</span>
    <div class="input-grid-2">
      ${[['Avg Daily Calories',avgCals,'kcal','var(--red)'],['Avg Daily Protein',avgPro,'g','var(--teal)']].map(([l,v,u,c])=>`
      <div style="background:var(--bg4);border-radius:12px;padding:14px">
        <div style="font-size:26px;font-weight:900;color:${c}">${v}</div>
        <div style="font-size:11px;color:var(--text3)">${u}</div>
        <div style="font-size:11px;color:var(--text4);margin-top:4px">${l}</div>
      </div>`).join('')}
    </div>
  </div>`;

  // Goals progress
  html += `<div class="card">
    <span class="section-label">Goal Progress</span>
    ${goals.length ? goals.map(g=>{
      const pct = Math.min(100,Math.round(g.current/g.target*100));
      return `<div style="margin-bottom:14px">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px">
          <span style="color:var(--text2);font-size:13px">${g.name}</span>
          <span style="color:var(--orange);font-weight:700;font-size:13px">${pct}%</span>
        </div>
        <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
      </div>`;
    }).join('') : `<div style="color:var(--text4);font-size:13px;padding:8px 0">No goals set yet</div>`}
  </div>`;

  document.getElementById('page-insights').innerHTML = html;
}

// ═══════════════════════════════════════════════════

// ═══════════════════════════════════════════════════
initPin();
</script>
