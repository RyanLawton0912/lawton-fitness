  <script>
    function setStatus(msg){ var el=document.getElementById('splash-status'); if(el) el.textContent=msg; }
    function hideSplash(){ 
      var s=document.getElementById('splash');
      if(s){s.classList.add('fade');setTimeout(function(){s.remove()},500);}
    }
    function showError(msg){
      var s=document.getElementById('splash-status');
      if(s){s.style.color='#ff6b6b';s.textContent=msg;}
    }
    
    // Load a script dynamically and return a promise
    function loadScript(src){
      return new Promise(function(resolve,reject){
        var s=document.createElement('script');
        s.src=src;
        s.onload=resolve;
        s.onerror=function(){ reject(new Error('Failed to load: '+src)); };
        document.head.appendChild(s);
      });
    }
    
    // CDN URLs with fallbacks
    var REACT_URL = 'https://unpkg.com/react@18/umd/react.production.min.js';
    var REACTDOM_URL = 'https://unpkg.com/react-dom@18/umd/react-dom.production.min.js';
    var BABEL_URL = 'https://unpkg.com/@babel/standalone@7.23.6/babel.min.js';
    
    // Fallback CDNs
    var REACT_FB = 'https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js';
    var REACTDOM_FB = 'https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js';
    var BABEL_FB = 'https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.6/babel.min.js';

    function loadWithFallback(primary, fallback){
      return loadScript(primary).catch(function(){
        console.warn('Primary CDN failed, trying fallback...');
        return loadScript(fallback);
      });
    }

    async function bootApp(){
      try {
        setStatus('Loading React...');
        await loadWithFallback(REACT_URL, REACT_FB);
        
        setStatus('Loading renderer...');
        await loadWithFallback(REACTDOM_URL, REACTDOM_FB);
        
        setStatus('Loading compiler...');
        await loadWithFallback(BABEL_URL, BABEL_FB);
        
        setStatus('Starting app...');
        
        // Get the JSX source
        var jsxSrc = document.getElementById('app-source').textContent;
        
        // Transform JSX to JS using Babel
        var transformed = Babel.transform(jsxSrc, {
          presets: ['react'],
          filename: 'app.jsx'
        }).code;
        
        // Execute the transformed code
        var fn = new Function('React', 'ReactDOM', transformed + '\nreturn LawtonFitness;');
        var AppComponent = fn(React, ReactDOM);
        
        // Mount
        var root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(AppComponent));
        
        // Hide splash after first render
        requestAnimationFrame(function(){
          setTimeout(hideSplash, 200);
        });
        
      } catch(err) {
        console.error('Boot failed:', err);
        showError('Error: ' + err.message);
      }
    }
    
    // Start loading when DOM is ready
    if(document.readyState === 'loading'){
      document.addEventListener('DOMContentLoaded', bootApp);
    } else {
      bootApp();
    }
  </script>

// ─── Ring ─────────────────────────────────────────────────────────────────────
function Ring({ pct, size = 60, stroke = 6, color = "#FF6B35", children }) {
  const r = (size - stroke) / 2;
  const circ = 2 * Math.PI * r;
  const filled = circ * Math.min(1, pct / 100);
  return (
    <div style={{ position: "relative", width: size, height: size, flexShrink: 0 }}>
      <svg width={size} height={size} style={{ transform: "rotate(-90deg)" }}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#1e1e2a" strokeWidth={stroke} />
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeDasharray={`${filled} ${circ}`} strokeLinecap="round" style={{ transition: "stroke-dasharray .8s ease" }} />
      </svg>
      <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center" }}>{children}</div>
    </div>
  );
}

  useEffect(() => {
    (async () => {
      const c = await load(KEYS.clients) || SEED_CLIENTS;
      const od = await load(KEYS.ownerData) || SEED_OWNER_DATA;
      setClients(c);
      setOwnerData(od);
      // Load all client data
      const cd = {};
      for (const client of c) {
        cd[client.id] = {
          workouts: await load(KEYS.workouts(client.id)) || (SEED_CLIENT_DATA[client.id]?.workouts || []),
          nutrition: await load(KEYS.nutrition(client.id)) || (SEED_CLIENT_DATA[client.id]?.nutrition || []),
          steps: await load(KEYS.steps(client.id)) || (SEED_CLIENT_DATA[client.id]?.steps || []),
          supplements: await load(KEYS.supplements(client.id)) || (SEED_CLIENT_DATA[client.id]?.supplements || []),
          goals: await load(KEYS.goals(client.id)) || (SEED_CLIENT_DATA[client.id]?.goals || []),
          checkins: await load(KEYS.checkins(client.id)) || (SEED_CLIENT_DATA[client.id]?.checkins || []),
          plan: await load(KEYS.plans(client.id)) || (SEED_CLIENT_DATA[client.id]?.plan || { training: "", nutrition: "", notes: "" }),
        };
      }
      setClientData(cd);
      setLoaded(true);
    })();
  }, []);

  // Persist helpers
  const saveOwnerData = (od) => { setOwnerData(od); save(KEYS.ownerData, od); };
  const saveClientField = (id, field, val) => {
    const updated = { ...clientData, [id]: { ...clientData[id], [field]: val } };
    setClientData(updated);
    save(KEYS[field] ? KEYS[field](id) : `lf:${field}:${id}`, val);
  };
  const saveClientPlan = (id, plan) => {
    const updated = { ...clientData, [id]: { ...clientData[id], plan } };
    setClientData(updated);
    save(KEYS.plans(id), plan);
  };
  const addClient = (c) => {
    const newClient = { ...c, id: `c${Date.now()}`, joined: today(), avatar: c.name.split(" ").map(n => n[0]).join("").toUpperCase().slice(0, 2) };
    const updated = [...clients, newClient];
    setClients(updated);
    save(KEYS.clients, updated);
    const emptyData = { workouts: [], nutrition: [], steps: [], supplements: [], goals: [], checkins: [], plan: { training: "", nutrition: "", notes: "" } };
    setClientData(p => ({ ...p, [newClient.id]: emptyData }));
  };
  const removeClient = (id) => {
    const updated = clients.filter(c => c.id !== id);
    setClients(updated);
    save(KEYS.clients, updated);
  };
  const toggleClientStatus = (id) => {
    const updated = clients.map(c => c.id === id ? { ...c, status: c.status === "active" ? "paused" : "active" } : c);
    setClients(updated);
    save(KEYS.clients, updated);
  };

  if (!loaded) return (
    <div style={{ background: "#0a0a0f", height: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 20 }}>
      <LFLogoLarge size={70} />
      <div style={{ color: "#FF6B35", fontFamily: "'DM Sans',sans-serif", fontSize: 13, letterSpacing: 4, opacity: .7 }}>LOADING...</div>
    </div>
  );

  if (!session) return <PINScreen clients={clients} onOwnerLogin={() => setSession({ role: "owner" })} onClientLogin={(c) => setSession({ role: "client", client: c })} />;
  if (session.role === "owner") return <OwnerApp clients={clients} ownerData={ownerData} clientData={clientData} onLogout={() => setSession(null)} saveOwnerData={saveOwnerData} saveClientField={saveClientField} saveClientPlan={saveClientPlan} addClient={addClient} removeClient={removeClient} toggleClientStatus={toggleClientStatus} />;
  if (session.role === "client") return <ClientApp client={session.client} data={clientData[session.client.id] || {}} onLogout={() => setSession(null)} onSave={(field, val) => saveClientField(session.client.id, field, val)} />;
}

function avatarColor(name) {
const colors = [”#FF6B35”, “#4ecdc4”, “#a78bfa”, “#ffd93d”, “#ff6b6b”, “#06d6a0”];
let h = 0; for (let c of name) h += c.charCodeAt(0);
return colors[h % colors.length];
}

function ClientApp({ client, data, onLogout, onSave }) {
const [tab, setTab] = useState(“home”);
const [modal, setModal] = useState(null);

const d = data || {};
const actions = {
addWorkout: (w) => onSave(“workouts”, [{ …w, id: Date.now() }, …(d.workouts || [])]),
addNutrition: (n) => onSave(“nutrition”, [{ …n, id: Date.now() }, …(d.nutrition || [])]),
addSteps: (s) => onSave(“steps”, [{ …s, id: Date.now() }, …(d.steps || []).filter(x => x.date !== s.date)]),
addSupplement: (s) => onSave(“supplements”, […(d.supplements || []), { …s, id: Date.now() }]),
toggleSupplement: (id) => onSave(“supplements”, (d.supplements || []).map(s => s.id === id ? { …s, active: !s.active } : s)),
deleteSupplement: (id) => onSave(“supplements”, (d.supplements || []).filter(s => s.id !== id)),
deleteWorkout: (id) => onSave(“workouts”, (d.workouts || []).filter(w => w.id !== id)),
addCheckin: (ci) => onSave(“checkins”, [{ …ci, id: Date.now() }, …(d.checkins || [])]),
};

const fabMap = { workouts: “workout”, nutrition: “nutrition”, steps: “steps”, supplements: “supplement”, checkins: “checkin” };

return (
<div style={S.app}>
<style>{css}</style>
<header style={S.header}>
<div style={{ display: “flex”, alignItems: “center”, gap: 10 }}>
<LFLogo size={32} />
<div>
<div style={S.brandNameSmall}>LAWTON FITNESS</div>
<div style={{ fontSize: 10, color: “#4ecdc4”, fontWeight: 700, letterSpacing: 1 }}>{client.name.toUpperCase()}</div>
</div>
</div>
<button style={S.logoutBtn} onClick={onLogout}><Icon n="logout" s={16} /></button>
</header>
<nav style={S.nav}>
{[
{ id: “home”, icon: “bolt”, label: “Home” },
{ id: “workouts”, icon: “dumbbell”, label: “Workouts” },
{ id: “nutrition”, icon: “apple”, label: “Nutrition” },
{ id: “steps”, icon: “footprint”, label: “Steps” },
{ id: “supplements”, icon: “pill”, label: “Supps” },
{ id: “checkins”, icon: “clip”, label: “Check-in” },
{ id: “plan”, icon: “target”, label: “My Plan” },
].map(({ id, icon, label }) => (
<button key={id} style={{ …S.navBtn, …(tab === id ? { …S.navBtnActive, color: “#4ecdc4”, background: “#4ecdc418”, border: “1px solid #4ecdc433” } : {}) }} onClick={() => setTab(id)}>
<Icon n={icon} s={17} /><span>{label}</span>
</button>
))}
</nav>
<main style={S.main}>
{tab === “home”        && <ClientHome client={client} data={d} setModal={setModal} setTab={setTab} />}
{tab === “workouts”    && <WorkoutsTab workouts={d.workouts || []} onDelete={actions.deleteWorkout} setModal={setModal} />}
{tab === “nutrition”   && <NutritionTab nutrition={d.nutrition || []} setModal={setModal} />}
{tab === “steps”       && <StepsTab steps={d.steps || []} setModal={setModal} />}
{tab === “supplements” && <SupplementsTab supplements={d.supplements || []} onToggle={actions.toggleSupplement} onDelete={actions.deleteSupplement} setModal={setModal} />}
{tab === “checkins”    && <CheckinsTab checkins={d.checkins || []} setModal={setModal} />}
{tab === “plan”        && <ClientPlanView plan={d.plan} />}
</main>
<button style={{ …S.fab, background: “#4ecdc4” }} className=“fab” onClick={() => setModal(fabMap[tab] || “workout”)}><Icon n="plus" s={24} /></button>
{modal === “workout”    && <WorkoutModal onClose={() => setModal(null)} onSave={w => { actions.addWorkout(w); setModal(null); }} />}
{modal === “nutrition”  && <NutritionModal onClose={() => setModal(null)} onSave={n => { actions.addNutrition(n); setModal(null); }} />}
{modal === “steps”      && <StepsModal onClose={() => setModal(null)} onSave={s => { actions.addSteps(s); setModal(null); }} />}
{modal === “supplement” && <SupplementModal onClose={() => setModal(null)} onSave={s => { actions.addSupplement(s); setModal(null); }} />}
{modal === “checkin”    && <CheckinModal onClose={() => setModal(null)} onSave={ci => { actions.addCheckin(ci); setModal(null); }} />}
</div>
);
}

function WorkoutModal({ onClose, onSave }) {
const [name, setName] = useState(””); const [date, setDate] = useState(today()); const [duration, setDuration] = useState(45);
const [exercises, setExercises] = useState([{ name: “”, sets: [{ w: “”, r: “” }] }]);
const addEx = () => setExercises(p => […p, { name: “”, sets: [{ w:””,r:”” }] }]);
const addSet = (i) => setExercises(p => p.map((e,idx) => idx===i ? {…e, sets:[…e.sets,{w:””,r:””}]} : e));
const updateEx = (i,f,v) => setExercises(p => p.map((e,idx) => idx===i ? {…e,[f]:v} : e));
const updateSet = (ei,si,f,v) => setExercises(p => p.map((e,i) => i===ei ? {…e, sets:e.sets.map((s,j) => j===si ? {…s,[f]:v} : s)} : e));
const removeEx = (i) => setExercises(p => p.filter((_,idx)=>idx!==i));
const submit = () => { if (!name) return; onSave({ name, date, duration: Number(duration), exercises: exercises.filter(e=>e.name).map(e=>({name:e.name,sets:e.sets.map(s=>({w:Number(s.w)||0,r:Number(s.r)||0})).filter(s=>s.r>0)})).filter(e=>e.sets.length) }); };
return (
<Modal title="Log Workout" onClose={onClose}>
<label style={S.label}>Workout Name</label><input style={S.input} value={name} onChange={e=>setName(e.target.value)} placeholder=“e.g. Push Day” />
<div style={{display:“flex”,gap:12}}>
<div style={{flex:1}}><label style={S.label}>Date</label><input style={S.input} type=“date” value={date} onChange={e=>setDate(e.target.value)} /></div>
<div style={{flex:1}}><label style={S.label}>Duration (min)</label><input style={S.input} type=“number” value={duration} onChange={e=>setDuration(e.target.value)} /></div>
</div>
<div><div style={{display:“flex”,justifyContent:“space-between”,alignItems:“center”,marginBottom:10}}><span style={S.label}>Exercises</span><button style={S.smallBtn} onClick={addEx}>+ Add</button></div>
{exercises.map((ex,i) => (
<div key={i} style={{background:”#1a1a26”,borderRadius:12,padding:14,marginBottom:10}}>
<div style={{display:“flex”,gap:8,marginBottom:8}}>
<input style={{…S.input,flex:1,margin:0}} value={ex.name} onChange={e=>updateEx(i,“name”,e.target.value)} placeholder=“Exercise name” />
{exercises.length>1 && <button style={S.iconBtn} onClick={()=>removeEx(i)}><Icon n="x" s={14}/></button>}
</div>
{ex.sets.map((s,j) => (
<div key={j} style={{display:“grid”,gridTemplateColumns:“28px 1fr 1fr”,gap:8,marginBottom:8,alignItems:“center”}}>
<span style={{fontSize:11,color:”#666”,fontWeight:700,textAlign:“center”}}>{j+1}</span>
<input style={S.setInput} type=“number” value={s.w} onChange={e=>updateSet(i,j,“w”,e.target.value)} placeholder=“kg” />
<input style={S.setInput} type=“number” value={s.r} onChange={e=>updateSet(i,j,“r”,e.target.value)} placeholder=“reps” />
</div>
))}
<button style={S.smallBtn} onClick={()=>addSet(i)}>+ Set</button>
</div>
))}
</div>
<button style={S.saveBtn} onClick={submit}>Save Workout</button>
</Modal>
);
}

function SupplementModal({ onClose, onSave }) {
const [name,setName]=useState(””); const [dose,setDose]=useState(””); const [timing,setTiming]=useState(“Morning”); const [color,setColor]=useState(”#4ecdc4”);
const presets=[{name:“Creatine”,dose:“5g”,timing:“Post-workout”},{name:“Whey Protein”,dose:“30g”,timing:“Post-workout”},{name:“Vitamin D3”,dose:“2000 IU”,timing:“Morning”},{name:“Omega-3”,dose:“1g”,timing:“With meals”},{name:“Magnesium”,dose:“400mg”,timing:“Evening”},{name:“Zinc”,dose:“15mg”,timing:“Morning”},{name:“Caffeine”,dose:“200mg”,timing:“Pre-workout”},{name:“Beta-Alanine”,dose:“3.2g”,timing:“Pre-workout”}];
const timings=[“Morning”,“Pre-workout”,“Post-workout”,“With meals”,“Evening”,“Before bed”];
const colors=[”#4ecdc4”,”#FF6B35”,”#ff6b6b”,”#a78bfa”,”#ffd93d”,”#ff9f43”,”#06d6a0”,”#0652DD”];
return (
<Modal title="Add Supplement" onClose={onClose}>
<label style={S.label}>Quick Add</label>
<div style={{display:“flex”,flexWrap:“wrap”,gap:8}}>{presets.map((p,i)=><button key={i} style={{…S.smallBtn,fontSize:12}} onClick={()=>{setName(p.name);setDose(p.dose);setTiming(p.timing)}}>{p.name}</button>)}</div>
<label style={S.label}>Name</label><input style={S.input} value={name} onChange={e=>setName(e.target.value)} placeholder=“e.g. Creatine”/>
<label style={S.label}>Dose</label><input style={S.input} value={dose} onChange={e=>setDose(e.target.value)} placeholder=“e.g. 5g”/>
<label style={S.label}>Timing</label>
<div style={{display:“flex”,flexWrap:“wrap”,gap:8}}>{timings.map(t=><button key={t} style={{…S.smallBtn,…(timing===t?{borderColor:”#FF6B3566”,color:”#FF6B35”,background:”#FF6B3514”}:{}),padding:“7px 12px”}} onClick={()=>setTiming(t)}>{t}</button>)}</div>
<label style={S.label}>Colour</label>
<div style={{display:“flex”,gap:10}}>{colors.map(c=><div key={c} onClick={()=>setColor(c)} style={{width:30,height:30,borderRadius:“50%”,background:c,cursor:“pointer”,border:color===c?“3px solid #fff”:“3px solid transparent”,transition:“border .15s”}}/>)}</div>
<button style={S.saveBtn} onClick={()=>{if(name&&dose)onSave({name,dose,timing,color,active:true})}}>Add Supplement</button>
</Modal>
);
}

function GoalModal({ onClose, onSave }) {
const [name,setName]=useState(””); const [target,setTarget]=useState(””); const [current,setCurrent]=useState(””); const [unit,setUnit]=useState(“kg”); const [category,setCategory]=useState(“strength”); const [deadline,setDeadline]=useState(””);
return (
<Modal title="Add Goal" onClose={onClose}>
<label style={S.label}>Goal Name</label><input style={S.input} value={name} onChange={e=>setName(e.target.value)} placeholder=“e.g. Bench Press 100kg”/>
<div style={{display:“grid”,gridTemplateColumns:“1fr 1fr”,gap:10}}>
<div><label style={S.label}>Target</label><input style={S.input} type=“number” value={target} onChange={e=>setTarget(e.target.value)} placeholder=“100”/></div>
<div><label style={S.label}>Current</label><input style={S.input} type=“number” value={current} onChange={e=>setCurrent(e.target.value)} placeholder=“0”/></div>
<div><label style={S.label}>Unit</label><input style={S.input} value={unit} onChange={e=>setUnit(e.target.value)} placeholder=“kg/g/reps”/></div>
<div><label style={S.label}>Deadline</label><input style={S.input} type=“date” value={deadline} onChange={e=>setDeadline(e.target.value)}/></div>
</div>
<label style={S.label}>Category</label>
<div style={{display:“flex”,gap:8,flexWrap:“wrap”}}>
{[“strength”,“nutrition”,“cardio”,“body”].map(c=><button key={c} style={{…S.smallBtn,…(category===c?{borderColor:”#FF6B3566”,color:”#FF6B35”,background:”#FF6B3514”}:{}),padding:“8px 14px”}} onClick={()=>setCategory(c)}>{c}</button>)}
</div>
<button style={S.saveBtn} onClick={()=>{if(name&&target)onSave({name,target:Number(target),current:Number(current)||0,unit,category,deadline})}}>Save Goal</button>
</Modal>
);
}

function CheckinModal({ onClose, onSave }) {
const [date,setDate]=useState(today()); const [type,setType]=useState(“weekly”);
const [mood,setMood]=useState(3); const [energy,setEnergy]=useState(3); const [weight,setWeight]=useState(””);
const [compliance,setCompliance]=useState(””); const [notes,setNotes]=useState(””);
const [chest,setChest]=useState(””); const [waist,setWaist]=useState(””); const [hips,setHips]=useState(””);
return (
<Modal title="Submit Check-in" onClose={onClose}>
<div style={{display:“flex”,gap:8}}>
{[“daily”,“weekly”].map(t=><button key={t} style={{…S.smallBtn,…(type===t?{borderColor:”#FF6B3566”,color:”#FF6B35”,background:”#FF6B3514”}:{}),flex:1,padding:“10px”}} onClick={()=>setType(t)}>{t.charAt(0).toUpperCase()+t.slice(1)} Check-in</button>)}
</div>
<label style={S.label}>Date</label><input style={S.input} type=“date” value={date} onChange={e=>setDate(e.target.value)}/>
<label style={S.label}>Mood (1–5)</label>
<div style={{display:“flex”,gap:8}}>{[1,2,3,4,5].map(n=><button key={n} style={{flex:1,padding:“12px”,borderRadius:10,border:`2px solid ${n<=mood?"#FF6B35":"#2a2a3a"}`,background:n<=mood?”#FF6B3522”:“transparent”,color:n<=mood?”#FF6B35”:”#555”,cursor:“pointer”,fontSize:16}} onClick={()=>setMood(n)}>★</button>)}</div>
<label style={S.label}>Energy (1–5)</label>
<div style={{display:“flex”,gap:8}}>{[1,2,3,4,5].map(n=><button key={n} style={{flex:1,padding:“12px”,borderRadius:10,border:`2px solid ${n<=energy?"#ffd93d":"#2a2a3a"}`,background:n<=energy?”#ffd93d22”:“transparent”,color:n<=energy?”#ffd93d”:”#555”,cursor:“pointer”,fontSize:16}} onClick={()=>setEnergy(n)}>⚡</button>)}</div>
<label style={S.label}>Current Weight (kg)</label><input style={S.input} type=“number” value={weight} onChange={e=>setWeight(e.target.value)} placeholder=“e.g. 82.5”/>
<label style={S.label}>Workout Compliance</label><input style={S.input} value={compliance} onChange={e=>setCompliance(e.target.value)} placeholder=“e.g. 3/4 workouts completed”/>
<label style={S.label}>Notes to Coach Lawton</label><textarea style={{…S.input,minHeight:80,resize:“vertical”}} value={notes} onChange={e=>setNotes(e.target.value)} placeholder=“How’s it going? Any issues? Energy levels? Sleep?”/>
{type===“weekly” && <>
<label style={S.label}>Measurements (cm)</label>
<div style={{display:“grid”,gridTemplateColumns:“1fr 1fr 1fr”,gap:10}}>
{[[“Chest”,chest,setChest],[“Waist”,waist,setWaist],[“Hips”,hips,setHips]].map(([pl,v,set],i)=><input key={i} style={S.input} type=“number” value={v} onChange={e=>set(e.target.value)} placeholder={pl}/>)}
</div>
</>}
<button style={{…S.saveBtn,background:”#FF6B35”}} onClick={()=>onSave({date,type,mood,energy,weight:Number(weight)||0,compliance,notes,measurements:type===“weekly”&&(chest||waist||hips)?{…(chest?{chest:Number(chest)}:{}),..  (waist?{waist:Number(waist)}:{}),..  (hips?{hips:Number(hips)}:{})}:null})}>Submit Check-in</button>
</Modal>
);
}

function AddClientModal({ onClose, onSave }) {
const [name,setName]=useState(””); const [email,setEmail]=useState(””); const [goal,setGoal]=useState(””); const [pin,setPin]=useState(””);
return (
<Modal title="Add New Client" onClose={onClose}>
<label style={S.label}>Full Name</label><input style={S.input} value={name} onChange={e=>setName(e.target.value)} placeholder=“e.g. Jamie Clarke”/>
<label style={S.label}>Email</label><input style={S.input} value={email} onChange={e=>setEmail(e.target.value)} placeholder=“jamie@email.com” type=“email”/>
<label style={S.label}>Goal</label><input style={S.input} value={goal} onChange={e=>setGoal(e.target.value)} placeholder=“e.g. Build muscle & strength”/>
<label style={S.label}>Client PIN (4 digits)</label><input style={{…S.input,letterSpacing:8,fontSize:22,textAlign:“center”}} type=“number” value={pin} onChange={e=>setPin(e.target.value.slice(0,4))} placeholder=”••••” maxLength={4}/>
<div style={{background:”#1a1a26”,borderRadius:10,padding:12,fontSize:12,color:”#888”}}>Share this PIN with your client so they can log in to their account.</div>
<button style={S.saveBtn} onClick={()=>{if(name&&pin.length===4)onSave({name,email,goal,pin,status:“active”})}}>Add Client</button>
</Modal>
);
}
